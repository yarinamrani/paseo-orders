<title>פסאו — הזמנות ספקים</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="הזמנות">
<meta name="theme-color" content="#0C0C0E">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔶</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0C0C0E;--card:#1A1A1F;--card-active:#22222A;--border:#2A2A33;--text:#E8E8EC;--dim:#7A7A88;--accent:#C4A265;--accent-dim:rgba(196,162,101,0.15);--green:#4ADE80}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}

/* === INDEX VIEW === */
#indexView{padding:16px 12px 40px}
#indexView h1{font-size:26px;font-weight:900;color:var(--accent);text-align:center;margin:20px 0 4px}
.idx-sub{text-align:center;color:var(--dim);font-size:13px;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;transition:all .15s}
.card:active{transform:scale(.97);border-color:var(--accent)}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.card-emoji{font-size:28px}
.card-count{font-size:11px;color:var(--dim);background:#22222A;padding:2px 8px;border-radius:8px}
.card-name{font-size:16px;font-weight:700;margin-bottom:2px}
.card-meta{font-size:11px;color:var(--dim);line-height:1.4;min-height:16px}

/* === SUPPLIER VIEW === */
#supplierView{display:none;padding-bottom:140px}
.header{position:sticky;top:0;z-index:100;background:linear-gradient(to bottom,var(--bg) 80%,transparent);padding:16px 16px 24px}
.header h1{font-size:22px;font-weight:900;color:var(--accent);letter-spacing:-.5px}
.header .sub{font-size:13px;color:var(--dim);margin-top:2px}
.back{display:inline-flex;align-items:center;gap:4px;color:var(--dim);font-size:13px;cursor:pointer;margin-bottom:6px;background:none;border:none;font-family:'Heebo',sans-serif;padding:4px 0}
.back:active{color:var(--accent)}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);padding:12px 16px 6px}
.items{padding:0 10px}
.item{display:grid;grid-template-columns:1fr auto;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:6px;transition:all .15s;cursor:pointer;user-select:none}
.item.active{background:var(--card-active);border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),inset 0 0 12px var(--accent-dim)}
.item-info h3{font-size:15px;font-weight:700;line-height:1.3}
.item-info .price{font-size:12px;color:var(--dim);margin-top:1px}
.qty-control{display:none;align-items:center;direction:ltr}
.item.active .qty-control{display:flex}
.qty-btn{width:38px;height:38px;border:1px solid var(--border);background:var(--card);color:var(--accent);font-size:20px;font-weight:700;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .1s}
.qty-btn:active{background:var(--accent-dim);transform:scale(.92)}
.qty-value{width:44px;text-align:center;font-size:20px;font-weight:900;color:var(--accent);background:none;border:none;font-family:'Heebo',sans-serif;-moz-appearance:textfield}
.qty-value::-webkit-inner-spin-button,.qty-value::-webkit-outer-spin-button{-webkit-appearance:none}

/* === BOTTOM BAR === */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(to top,var(--bg) 60%,transparent);padding:20px 16px calc(env(safe-area-inset-bottom,12px) + 12px);z-index:200;display:none}
.summary{font-size:13px;color:var(--dim);text-align:center;margin-bottom:10px}
.summary strong{color:var(--accent);font-size:16px}
.btn-row{display:flex;gap:8px}
.btn{flex:1;padding:14px;border-radius:12px;border:none;font-family:'Heebo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-wa{background:#25D366;color:#fff;flex:2}
.btn-cp{background:var(--card);color:var(--text);border:1px solid var(--border);flex:1}
.btn-reset{background:none;border:1px solid var(--border);color:var(--dim);font-size:13px;padding:8px 14px;border-radius:8px;cursor:pointer;margin:10px auto 0;display:block}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--green);color:#000;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:700;z-index:999;transition:transform .3s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>

<div id="indexView"></div>

let curS = null;
const state = {};

function countItems(s) { return s.sec.reduce((a,c) => a + c.it.length, 0); }

function renderIndex() {
  document.getElementById('supplierView').style.display = 'none';
  document.getElementById('bottomBar').style.display = 'none';
  const v = document.getElementById('indexView');
  v.style.display = 'block';
  let h = '<h1>🔶 הזמנות פסאו</h1><div class="idx-sub">'+S.length+' ספקים · בחר ספק להזמנה</div><div class="grid">';
  S.forEach((s,i) => {
    const cnt = countItems(s);
    const meta = [s.d, s.ct].filter(Boolean).join(' · ');
    h += '<div class="card" onclick="openSupplier('+i+')"><div class="card-top"><span class="card-emoji">'+s.e+'</span><span class="card-count">'+cnt+' פריטים</span></div><div class="card-name">'+s.n+'</div><div class="card-meta">'+meta+'</div></div>';
  });
  h += '</div>';
  v.innerHTML = h;
}

function openSupplier(i) {
  curS = i;
  const s = S[i];
  document.getElementById('indexView').style.display = 'none';
  document.getElementById('supplierView').style.display = 'block';
  document.getElementById('bottomBar').style.display = 'block';
  document.getElementById('svTitle').textContent = s.e + ' ' + s.n;
  const meta = [s.ct, s.d ? '📅 '+s.d : ''].filter(Boolean).join(' · ');
  document.getElementById('svSub').textContent = meta || 'לחץ על פריט לסמן, בחר כמות, שלח';
  renderItems();
  window.scrollTo(0,0);
}

function goHome() {
  curS = null;
  renderIndex();
  window.scrollTo(0,0);
}

function key(si, ii) { return curS+'-'+si+'-'+ii; }
function getIt(si,ii) { return S[curS].sec[si].it[ii]; }

function renderItems() {
  const s = S[curS];
  let h = '';
  s.sec.forEach((sec,si) => {
    h += '<div class="section-label">'+sec.l+'</div><div class="items">';
    sec.it.forEach((it,ii) => {
      const k = key(si,ii);
      const st = state[k] || {a:false, q:it.par};
      const pr = it.pr > 0 ? it.pr.toFixed(2)+'₪ / '+it.u : it.u;
      h += '<div class="item'+(st.a?' active':'')+'" onclick="toggle('+si+','+ii+',event)"><div class="item-info"><h3>'+it.p+'</h3><div class="price">'+pr+'</div></div><div class="qty-control" onclick="event.stopPropagation()"><button class="qty-btn" onclick="chg('+si+','+ii+',-1)">−</button><input class="qty-value" type="number" value="'+st.q+'" min="0" max="99" onchange="setQ('+si+','+ii+',this.value)" onfocus="this.select()"><button class="qty-btn" onclick="chg('+si+','+ii+',1)">+</button></div></div>';
    });
    h += '</div>';
  });
  document.getElementById('svItems').innerHTML = h;
  updSum();
}

function toggle(si,ii,e) {
  if (e.target.closest('.qty-control')) return;
  const k = key(si,ii), it = getIt(si,ii);
  if (!state[k]) state[k] = {a:false, q:it.par};
  state[k].a = !state[k].a;
  renderItems();
}

function chg(si,ii,d) {
  const k = key(si,ii);
  if (!state[k]) return;
  state[k].q = Math.max(0, Math.min(99, state[k].q + d));
  if (state[k].q === 0) state[k].a = false;
  renderItems();
}

function setQ(si,ii,v) {
  const k = key(si,ii);
  if (!state[k]) return;
  state[k].q = Math.max(0, Math.min(99, parseInt(v)||0));
  if (state[k].q === 0) state[k].a = false;
  renderItems();
}

function getLines() {
  if (curS === null) return {lines:[], total:0};
  const s = S[curS]; let lines=[], total=0;
  s.sec.forEach((sec,si) => {
    sec.it.forEach((it,ii) => {
      const k = key(si,ii), st = state[k];
      if (st && st.a && st.q > 0) {
        const lt = it.pr * st.q;
        total += lt;
        lines.push({name:it.p, qty:st.q, unit:it.u, price:it.pr, lt});
      }
    });
  });
  return {lines, total};
}

function updSum() {
  const {lines, total} = getLines();
  const el = document.getElementById('summary');
  if (!lines.length) el.innerHTML = 'סמן פריטים להזמנה';
  else el.innerHTML = lines.length+' פריטים &middot; סה״כ משוער: <strong>'+total.toFixed(0)+'₪</strong>';
}

function buildTxt() {
  const {lines, total} = getLines();
  if (!lines.length) return null;
  const d = new Date(), ds = d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();
  let t = '🔶 הזמנה '+S[curS].n+' — '+ds+'\n\n';
  lines.forEach(l => t += '• '+l.name+' × '+l.qty+'\n');
  t += '\nסה״כ משוער: '+total.toFixed(0)+'₪ לפני מע״מ';
  return t;
}

function sendWA() {
  const t = buildTxt();
  if (!t) return toast('סמן לפחות פריט אחד');
  const enc = encodeURIComponent(t);
  const ph = S[curS].ph;
  window.open(ph ? 'https://wa.me/'+ph+'?text='+enc : 'https://wa.me/?text='+enc, '_blank');
}

function copyOrder() {
  const t = buildTxt();
  if (!t) return toast('סמן לפחות פריט אחד');
  navigator.clipboard.writeText(t).then(() => toast('הועתק ✓'));
}

function resetOrder() {
  if (curS === null) return;
  const s = S[curS];
  s.sec.forEach((sec,si) => sec.it.forEach((_,ii) => delete state[key(si,ii)]));
  renderItems();
  toast('אופס');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

renderIndex();
</script>
</body>
</html>
